<style>

    --dark: #111111;

    --white: #F2F2F2;
    --red: #C0392B;
    --green: #27AE60;
    --steel: #8C8C8C;
    --steel-light: #B0B0B0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--black); color:var(--white); font-family:'Barlow',sans-serif; }

  .nav-logo { font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--gold); letter-spacing:4px; }

  .nav-right a {
    color:var(--steel-light); text-decoration:none; font-family:'Barlow Condensed',sans-serif;
    font-weight:600; font-size:14px; letter-spacing:2px; text-transform:uppercase; transition:color 0.3s;
  }
  .nav-right a:hover { color:var(--gold); }
  .cart-btn {
    position:relative; background:none; border:1px solid var(--gold-dim); color:var(--gold);
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:14px; letter-spacing:2px;
    text-transform:uppercase; padding:10px 20px; cursor:pointer; transition:all 0.3s;
  }
  .cart-btn:hover { background:var(--gold); color:var(--black); border-color:var(--gold); }
  .cart-count {
    position:absolute; top:-8px; right:-8px; background:var(--red); color:var(--white);
    font-size:11px; font-weight:700; width:20px; height:20px; border-radius:50%;
    display:none; align-items:center; justify-content:center;

  /* === BREADCRUMB === */
  .breadcrumb {
    padding:100px 48px 0; max-width:1200px; margin:0 auto;
    font-family:'Barlow Condensed',sans-serif; font-size:13px; letter-spacing:2px;

  }
  .breadcrumb a { color:var(--gold); text-decoration:none; transition:color 0.3s; }
  .breadcrumb a:hover { color:var(--gold-bright); }

  /* === PRODUCT LAYOUT === */
  .product-page { max-width:1200px; margin:0 auto; padding:32px 48px 80px; }
  .product-layout {
    display:grid; grid-template-columns:1fr 1fr; gap:64px; align-items:start;
  }

  /* Image */
  .product-image-main {
    width:100%; aspect-ratio:1; background:linear-gradient(135deg,#1e1e1e 0%,#151515 50%,#1e1e1e 100%);
    border:1px solid rgba(255,255,255,0.05); display:flex; align-items:center;

  }
  .product-image-main img { width:100%; height:100%; object-fit:cover; }
  .product-image-placeholder { font-size:120px; opacity:0.15; }
  .product-image-badge {

    font-weight:700; font-size:12px; letter-spacing:2px; text-transform:uppercase; padding:6px 16px;
  }
  .badge-new { background:var(--gold); color:var(--black); }
  .badge-hot { background:var(--red); color:var(--white); }

  /* Details */
  .product-details { padding-top:8px; }
  .product-category-label {
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:11px;
    letter-spacing:4px; text-transform:uppercase; color:var(--gold); margin-bottom:12px;
  }
  .product-title {
    font-family:'Bebas Neue',sans-serif; font-size:clamp(36px,5vw,56px);

  }

    font-family:'Permanent Marker',cursive; font-size:18px; color:var(--steel-light); margin-bottom:24px;
  }
  .product-price-tag {
    font-family:'Bebas Neue',sans-serif; font-size:48px; color:var(--gold);
    letter-spacing:2px; margin-bottom:8px;
  }
  .product-stock-info {
    font-family:'Barlow Condensed',sans-serif; font-size:13px; letter-spacing:2px;
    text-transform:uppercase; margin-bottom:28px;
  }
  .stock-in { color:var(--green); }
  .stock-low { color:var(--red); }
  .stock-out { color:var(--steel); }

  .product-actions { display:flex; gap:16px; align-items:center; margin-bottom:32px; }
  .qty-selector {

  .pdp-add-btn {
    flex:1; background:var(--gold); color:var(--black); font-family:'Bebas Neue',sans-serif;

  .related-card {

  .related-card-body { padding:16px; }
  .related-card-name {

  .related-card-price { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--gold); }

    text-align:center;
  }
  footer p { font-size:12px; color:var(--steel); }
  footer a { color:var(--gold); text-decoration:none; }

  /* === TOAST === */
  .toast {
    position:fixed; bottom:24px; right:24px; background:var(--darker);
    border:1px solid var(--gold); padding:16px 24px; z-index:3000;
    display:flex; align-items:center; gap:12px; transform:translateY(100px);
    opacity:0; transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94); max-width:360px;

  .toast.visible { transform:translateY(0); opacity:1; }

  .not-found { text-align:center; padding:200px 24px 100px; }
  .not-found h2 { font-family:'Bebas Neue',sans-serif; font-size:64px; letter-spacing:4px; color:var(--gold); }
  .not-found p { color:var(--steel); margin-top:12px; font-size:16px; }
  .not-found a {
    display:inline-block; margin-top:24px; background:var(--gold); color:var(--black);

    letter-spacing:3px; text-transform:uppercase; padding:14px 36px; text-decoration:none;

  .not-found a:hover { background:var(--gold-bright); }

  /* === RESPONSIVE === */
  @media(max-width:900px) {
    .product-layout { grid-template-columns:1fr; gap:32px; }
    .related-grid { grid-template-columns:1fr 1fr; }
    nav { padding:16px 24px; }
    .breadcrumb { padding:88px 24px 0; }
    .product-page { padding:24px 24px 60px; }
    .related-section { padding:0 24px 60px; }
  }
  @media(max-width:480px) {
    .product-specs { grid-template-columns:1fr; }
    .related-grid { grid-template-columns:1fr; }
    .product-actions { flex-direction:column; }
    .pdp-add-btn { width:100%; }
  }
</style>

// ── CART ──
var cart = JSON.parse(localStorage.getItem('fdc_cart') || '[]');
function saveCart() { localStorage.setItem('fdc_cart', JSON.stringify(cart)); }
function updateCartCount() {
  var total = 0;
  cart.forEach(function(i) { total += i.qty; });
  var el = document.getElementById('cartCount');
  el.textContent = total;
  el.classList.toggle('visible', total > 0);
}

function addToCartPDP(productId, qty) {
  var product = PRODUCTS.find(function(p) { return p.id === productId; });
  if (!product || product.stock <= 0) return;
  var existing = cart.find(function(i) { return i.id === productId; });
  if (existing) {
    if (existing.qty + qty > product.stock) { showToast('Maximum stock reached', '⚠️'); return; }
    existing.qty += qty;
  } else {
    cart.push({ id: productId, qty: qty });
  }
  saveCart();
  updateCartCount();
  var btn = document.getElementById('pdpAddBtn');
  btn.classList.add('added');
  btn.textContent = 'ADDED ✓';
  setTimeout(function() { btn.classList.remove('added'); btn.textContent = 'ADD TO CART'; }, 1500);
  showToast(product.name + ' added to cart');
}

function showToast(msg, icon) {
  var t = document.getElementById('toast');
  document.getElementById('toastText').textContent = msg;
  t.querySelector('span:first-child').textContent = icon || '✓';
  t.classList.add('visible');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('visible'); }, 2500);
}

// ── RENDER ──
function renderProduct(product) {
  document.title = product.name + ' — FDC Stickers';
  document.getElementById('breadcrumbName').textContent = product.name;

  var catLabels = { logos:'Logos', flags:'Flags & Patches', bbc:'BBC Suppressors', '2a':'2A Lifestyle', packs:'Value Packs', misc:'Misc' };
  var oos = product.stock <= 0;
  var low = product.stock > 0 && product.stock <= 10;

  var badgeHtml = '';
  if (product.badge === 'new') badgeHtml = '<div class="product-image-badge badge-new">New</div>';
  else if (product.badge === 'hot') badgeHtml = '<div class="product-image-badge badge-hot">Hot</div>';

  var imgHtml = product.image
    ? '<img src="' + product.image + '" alt="' + product.name + '">'
    : '<div class="product-image-placeholder">🔫</div>';

  var stockHtml = oos
    ? '<span class="stock-out">OUT OF STOCK</span>'
    : (low ? '<span class="stock-low">Only ' + product.stock + ' left — order soon</span>' : '<span class="stock-in">✓ In Stock — Ships in 1-2 days</span>');

  var specsHtml = '';
  if (product.specs) {
    var keys = Object.keys(product.specs);
    for (var i = 0; i < keys.length; i++) {
      specsHtml += '<div class="spec-item"><div class="spec-label">' + keys[i].replace(/([A-Z])/g,' $1').trim() + '</div><div class="spec-value">' + product.specs[keys[i]] + '</div></div>';
    }
  }

  var html = '<div class="product-page"><div class="product-layout">' +
    '<div class="product-image-main">' + badgeHtml + imgHtml + '</div>' +
    '<div class="product-details">' +
      '<div class="product-category-label">' + (catLabels[product.category] || product.category) + '</div>' +
      '<h1 class="product-title">' + product.name + '</h1>' +
      (product.tagline ? '<p class="product-tagline">"' + product.tagline + '"</p>' : '') +
      '<div class="product-price-tag">$' + product.price.toFixed(2) + '</div>' +
      '<div class="product-stock-info">' + stockHtml + '</div>' +
      '<div class="product-actions">' +
        '<div class="qty-selector">' +
          '<button onclick="changeQty(-1)">−</button>' +
          '<input type="number" id="pdpQty" value="1" min="1" max="' + product.stock + '">' +
          '<button onclick="changeQty(1)">+</button>' +
        '</div>' +
        '<button class="pdp-add-btn" id="pdpAddBtn" onclick="addToCartPDP(\'' + product.id + '\', getQty())"' + (oos ? ' disabled' : '') + '>' + (oos ? 'SOLD OUT' : 'ADD TO CART') + '</button>' +
      '</div>' +
      '<div class="product-description"><h3>About This Sticker</h3>' + (product.fullDescription || '<p>' + product.description + '</p>') + '</div>' +
      (specsHtml ? '<div class="product-specs">' + specsHtml + '</div>' : '') +
      '<div class="shipping-note">📦 Ships to lower 48 US states. FL orders include 7.5% sales tax. Free shipping on orders over $25.</div>' +
    '</div>' +
  '</div></div>';

  // Related products
  var related = PRODUCTS.filter(function(p) { return p.id !== product.id; });
  related.sort(function() { return 0.5 - Math.random(); });
  related = related.slice(0, 4);

  html += '<div class="related-section"><h2 class="related-title">You Might Also Like</h2><div class="related-grid">';
  related.forEach(function(r) {
    var rImg = r.image ? '<img src="' + r.image + '" alt="' + r.name + '">' : '<div style="font-size:48px;opacity:0.15;">🔫</div>';
    html += '<a class="related-card" href="/product?id=' + r.id + '"><div class="related-card-img">' + rImg + '</div><div class="related-card-body"><div class="related-card-name">' + r.name + '</div><div class="related-card-price">$' + r.price.toFixed(2) + '</div></div></a>';
  });
  html += '</div></div>';

  document.getElementById('productContent').innerHTML = html;
}

function render404() {
  document.title = 'Product Not Found — FDC Stickers';
  document.getElementById('breadcrumbName').textContent = 'Not Found';
  document.getElementById('productContent').innerHTML =
    '<div class="not-found"><h2>Product Not Found</h2><p>This sticker doesn\'t exist. Yet. Maybe suggest it to us.</p><a href="/#shop">Back to Shop</a></div>';
}

function getQty() { return parseInt(document.getElementById('pdpQty').value) || 1; }
function changeQty(d) {
  var input = document.getElementById('pdpQty');
  var v = parseInt(input.value) || 1;
  var max = parseInt(input.max) || 999;
  v = Math.max(1, Math.min(max, v + d));
  input.value = v;
}

// ── INIT ──
loadProducts();
updateCartCount();

var params = new URLSearchParams(window.location.search);
var productId = params.get('id');
if (productId) {
  var product = PRODUCTS.find(function(p) { return p.id === productId; });
  if (product) renderProduct(product);
  else render404();
} else {
  render404();
}
</script>
</body>
</html>
